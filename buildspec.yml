project:
  description: CPAN::Maker::Bootstrapper
  author:
    name: Rob Lauer
    mailto: rclauer@gmail.com
pm-module: CPAN::Maker::Bootstrapper
min-perl-version: 5.010
dependencies:
  requires: requires
  test-requires: test-requires
  recommends: recommends
path:
  pm-module: lib
  exe-files: bin
  tests: t
extra-files:
  - ChangeLog
  - release-notes.md
  - share:
    - README.md
    - Makefile.txt
    - buildspec.yml.tmpl
    - builder
    - .github/workflows/build.yml
    - .includes/git.mk
    - .includes/help.mk
    - .includes/perl.mk
    - .includes/release-notes.mk
    - .includes/update.mk
    - .includes/upgrade.mk
    - .includes/version.mk
    - .prompts/code-review.prompt
    - .prompts/pod-review.prompt
    - cli-module.pm.tmpl
    - class-module.pm.tmpl
    - test.t.tmpl
    - gitignore
    - modulino.tmpl
    - MANIFEST
    - cpan-maker-bootstrapper.yml
man-links:
  - bootstrapper: CPAN::Maker::Bootstrapper
  - cpan-maker-bootstrapper: CPAN::Maker::Bootstrapper

resources:
  homepage: http://github.com/rlauer6/CPAN-Maker-Bootstrapper
  bugtracker:
    web: http://github.com/rlauer6/CPAN-Maker-Bootstrapper/issues
    mailto: rclauer@gmail.com
  repository:
    url: git://github.com/rlauer6/CPAN-Maker-Bootstrapper.git
    web: http://github.com/rlauer6/CPAN-Maker-Bootstrapper
    type: 'git'
